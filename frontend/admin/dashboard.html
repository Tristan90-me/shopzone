<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ShopZone Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Shop<span>Zone</span></div>
      <div class="sidebar-logo-badge">Admin</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="dashboard.html" class="nav-item active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="products.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Products
      </a>
      <a href="orders.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
        Orders
        <span class="nav-badge" id="pendingBadge" style="display:none">0</span>
      </a>
      <div class="sidebar-section-label">Config</div>
      <a href="settings.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="sidebar-store-link" target="_blank">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View Store
      </a>
      <button class="logout-btn" onclick="logout()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="topbar-menu-btn" onclick="openSidebar()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <span style="font-size:13px;color:var(--text-muted)">
          Welcome, <strong id="adminName">Admin</strong>
        </span>
      </div>
    </div>

    <div class="page-content">

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <!-- Skeletons -->
        <div class="stat-card"><div style="height:12px;width:60%;background:var(--bg-subtle);border-radius:4px;margin-bottom:12px"></div><div style="height:36px;width:40%;background:var(--bg-subtle);border-radius:6px"></div></div>
        <div class="stat-card"><div style="height:12px;width:60%;background:var(--bg-subtle);border-radius:4px;margin-bottom:12px"></div><div style="height:36px;width:40%;background:var(--bg-subtle);border-radius:6px"></div></div>
        <div class="stat-card"><div style="height:12px;width:60%;background:var(--bg-subtle);border-radius:4px;margin-bottom:12px"></div><div style="height:36px;width:40%;background:var(--bg-subtle);border-radius:6px"></div></div>
        <div class="stat-card"><div style="height:12px;width:60%;background:var(--bg-subtle);border-radius:4px;margin-bottom:12px"></div><div style="height:36px;width:40%;background:var(--bg-subtle);border-radius:6px"></div></div>
      </div>

      <!-- Recent orders -->
      <div class="table-card">
        <div class="table-header">
          <h3>Recent Orders</h3>
          <a href="orders.html" class="btn btn-secondary btn-sm">View All Orders</a>
        </div>
        <div id="recentOrdersWrap">
          <table>
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Type</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recentOrdersBody">
              <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-light)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Bottom grid -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">

        <!-- Low stock -->
        <div class="table-card">
          <div class="table-header">
            <h3>Low Stock Alerts</h3>
            <a href="products.html" class="btn btn-secondary btn-sm">Manage</a>
          </div>
          <div id="lowStockWrap">
            <table>
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Stock</th>
                </tr>
              </thead>
              <tbody id="lowStockBody">
                <tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text-light)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Order status breakdown -->
        <div class="table-card">
          <div class="table-header">
            <h3>Order Status</h3>
          </div>
          <div style="padding:20px" id="statusBreakdown">
            <div style="color:var(--text-light);font-size:13px;text-align:center;padding:20px">Loading...</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const API = 'https://shopzone-backend.onrender.com/api';

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
      };
    }

    function logout() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      window.location.href = 'login.html';
    }

    function requireAuth() {
      if (!localStorage.getItem('adminToken')) {
        window.location.href = 'login.html';
      }
    }

    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('mobileOverlay').classList.add('open');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('mobileOverlay').classList.remove('open');
    }

    function formatCurrency(n) { return '$' + Number(n).toFixed(2); }
    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function statusBadge(status) {
      return `<span class="status-badge status-${status}"><span class="status-dot"></span>${status}</span>`;
    }

    function renderStats(orders, products) {
      const totalRevenue = orders.reduce((s, o) => s + o.total, 0);
      const pending = orders.filter(o => o.status === 'pending').length;
      const outOfStock = products.filter(p => p.stock === 0).length;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Total Revenue
          </div>
          <div class="stat-value">${formatCurrency(totalRevenue)}</div>
          <div class="stat-sub">${orders.length} total orders</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
            Pending Orders
          </div>
          <div class="stat-value">${pending}</div>
          <div class="stat-sub">Awaiting processing</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            Total Products
          </div>
          <div class="stat-value">${products.length}</div>
          <div class="stat-sub">${outOfStock} out of stock</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            Delivered
          </div>
          <div class="stat-value">${orders.filter(o => o.status === 'delivered' || o.status === 'pickedup').length}</div>
          <div class="stat-sub">Completed orders</div>
        </div>`;

      // Pending badge in sidebar
      if (pending > 0) {
        const badge = document.getElementById('pendingBadge');
        badge.textContent = pending;
        badge.style.display = 'inline';
      }
    }

    function renderRecentOrders(orders) {
      const recent = orders.slice(0, 8);
      if (recent.length === 0) {
        document.getElementById('recentOrdersBody').innerHTML =
          '<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📋</div><h3>No orders yet</h3><p>Orders will appear here once customers start buying.</p></div></td></tr>';
        return;
      }
      document.getElementById('recentOrdersBody').innerHTML = recent.map(o => `
        <tr style="cursor:pointer" onclick="window.location='orders.html'">
          <td><strong>${o.orderNumber}</strong></td>
          <td>
            <div style="font-weight:600">${o.customer?.name || '—'}</div>
            <div class="td-muted">${o.customer?.phone || ''}</div>
          </td>
          <td class="td-muted">${o.items.length} item${o.items.length !== 1 ? 's' : ''}</td>
          <td><strong>${formatCurrency(o.total)}</strong></td>
          <td class="td-muted">${o.deliveryType === 'delivery' ? '🚚 Delivery' : '🏪 Pickup'}</td>
          <td>${statusBadge(o.status)}</td>
          <td class="td-muted">${formatDate(o.createdAt)}</td>
        </tr>`).join('');
    }

    function renderLowStock(products) {
      const low = products.filter(p => p.stock <= 5).sort((a, b) => a.stock - b.stock);
      if (low.length === 0) {
        document.getElementById('lowStockBody').innerHTML =
          '<tr><td colspan="3"><div class="empty-state" style="padding:30px"><div class="empty-state-icon">✅</div><h3>All stocked up</h3></div></td></tr>';
        return;
      }
      document.getElementById('lowStockBody').innerHTML = low.map(p => `
        <tr>
          <td>
            <div style="font-weight:600;font-size:13px">${p.name}</div>
          </td>
          <td class="td-muted">${p.category}</td>
          <td>
            <span class="${p.stock === 0 ? 'stock-out' : 'stock-low'}">
              ${p.stock === 0 ? 'Out of stock' : p.stock + ' left'}
            </span>
          </td>
        </tr>`).join('');
    }

    function renderStatusBreakdown(orders) {
      const statuses = ['pending', 'ready', 'delivered', 'pickedup'];
      const labels = { pending: 'Pending', ready: 'Ready', delivered: 'Delivered', pickedup: 'Picked Up' };
      const total = orders.length || 1;

      document.getElementById('statusBreakdown').innerHTML = statuses.map(s => {
        const count = orders.filter(o => o.status === s).length;
        const pct = Math.round((count / total) * 100);
        return `
          <div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px">
              <span style="display:flex;align-items:center;gap:6px">${statusBadge(s)} ${labels[s]}</span>
              <span style="font-weight:600">${count}</span>
            </div>
            <div style="height:6px;background:var(--bg-subtle);border-radius:50px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:50px;transition:width 0.6s ease"></div>
            </div>
          </div>`;
      }).join('');
    }

    async function init() {
      requireAuth();
      document.getElementById('adminName').textContent =
        localStorage.getItem('adminUser') || 'Admin';

      try {
        const [orders, products] = await Promise.all([
          fetch(`${API}/orders`, { headers: authHeaders() }).then(r => r.json()),
          fetch(`${API}/products`).then(r => r.json()),
        ]);

        renderStats(orders, products);
        renderRecentOrders(orders);
        renderLowStock(products);
        renderStatusBreakdown(orders);
      } catch (err) {
        if (err.message?.includes('401')) logout();
      }
    }

    init();
  </script>
</body>
</html>
