<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — ShopZone</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      align-items: start;
      padding: 48px 0 80px;
    }

    /* ── Steps indicator ── */
    .steps {
      display: flex; align-items: center;
      gap: 0; margin-bottom: 36px;
    }
    .step {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 500;
      color: var(--text-light);
    }
    .step.active { color: var(--text); }
    .step.done { color: var(--accent); }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      background: var(--bg-card);
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .step.active .step-num {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }
    .step.done .step-num {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .step-line {
      flex: 1; height: 2px;
      background: var(--border);
      margin: 0 12px;
      min-width: 40px;
    }
    .step-line.done { background: var(--accent); }

    /* ── Form sections ── */
    .form-section {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .form-section-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .section-num {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      flex-shrink: 0;
    }
    .form-section-header h3 {
      font-size: 1rem; margin: 0;
    }
    .form-section-body { padding: 24px; }

    /* ── Delivery type selector ── */
    .delivery-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .delivery-option {
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      text-align: center;
    }
    .delivery-option:hover { border-color: var(--border-strong); }
    .delivery-option.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .delivery-option-icon {
      font-size: 1.8rem; line-height: 1;
    }
    .delivery-option-title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 600;
      color: var(--text);
    }
    .delivery-option-desc {
      font-size: 12px; color: var(--text-muted);
      line-height: 1.4;
    }
    .delivery-option-fee {
      font-size: 13px; font-weight: 700;
      color: var(--accent);
      margin-top: 4px;
    }
    .delivery-option.selected .delivery-option-title { color: var(--accent); }

    /* Address field slide */
    .address-field {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .address-field.show {
      max-height: 200px;
      opacity: 1;
    }

    /* ── Order summary (right panel) ── */
    .order-summary {
      position: sticky;
      top: calc(var(--nav-h) + 24px);
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }
    .summary-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 600;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .summary-edit {
      font-size: 13px; font-weight: 500;
      color: var(--accent); font-family: var(--font-body);
    }
    .summary-body { padding: 20px 24px; }
    .summary-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .summary-item:last-of-type { border-bottom: none; }
    .summary-item-img {
      width: 48px; height: 48px;
      border-radius: var(--radius);
      object-fit: cover;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .summary-item-info { flex: 1; min-width: 0; }
    .summary-item-name {
      font-size: 13px; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .summary-item-qty { font-size: 12px; color: var(--text-muted); }
    .summary-item-price {
      font-size: 13px; font-weight: 700;
      color: var(--text); flex-shrink: 0;
    }
    .summary-totals { padding: 16px 24px; border-top: 1px solid var(--border); }
    .total-row {
      display: flex; justify-content: space-between;
      font-size: 14px; color: var(--text-muted);
      padding: 5px 0;
    }
    .total-row.grand {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text);
      border-top: 1.5px solid var(--border);
      padding-top: 14px; margin-top: 8px;
    }
    .total-row.grand span:last-child {
      font-family: var(--font-display);
      font-size: 1.25rem;
    }
    .summary-footer { padding: 0 24px 24px; }

    /* ── Place order button ── */
    .place-order-btn {
      width: 100%;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius-lg);
      padding: 16px; font-size: 16px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all var(--transition);
      font-family: var(--font-body);
      margin-top: 16px;
    }
    .place-order-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .place-order-btn:disabled {
      opacity: 0.55; cursor: not-allowed; transform: none;
    }
    .place-order-btn.loading {
      opacity: 0.75; cursor: wait;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Security note ── */
    .security-note {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-light);
      justify-content: center; margin-top: 12px;
    }

    @media (max-width: 900px) {
      .checkout-layout {
        grid-template-columns: 1fr;
        padding: 24px 0 60px;
      }
      .order-summary { position: static; order: -1; }
      .delivery-options { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .delivery-options { grid-template-columns: 1fr; }
      .steps { display: none; }
    }
  </style>
</head>
<body>

  <div id="navbar-root"></div>

  <!-- Page header -->
  <div style="border-bottom: 1px solid var(--border);">
    <div class="container" style="padding-top:14px;padding-bottom:14px;">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span>›</span>
        <a href="cart.html">Cart</a>
        <span>›</span>
        <span>Checkout</span>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- Steps -->
    <div class="steps" style="padding-top:32px">
      <div class="step done">
        <div class="step-num">✓</div>
        <span>Cart</span>
      </div>
      <div class="step-line done"></div>
      <div class="step active">
        <div class="step-num">2</div>
        <span>Checkout</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-num">3</div>
        <span>Confirmation</span>
      </div>
    </div>

    <div class="checkout-layout">

      <!-- Left: Form -->
      <div>

        <!-- Section 1: Contact -->
        <div class="form-section">
          <div class="form-section-header">
            <div class="section-num">1</div>
            <h3>Your Details</h3>
          </div>
          <div class="form-section-body">
            <div class="form-group">
              <label class="form-label" for="customerName">Full Name</label>
              <input class="form-input" type="text" id="customerName"
                placeholder="e.g. John Mensah" autocomplete="name">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="customerPhone">Phone Number</label>
              <input class="form-input" type="tel" id="customerPhone"
                placeholder="e.g. 0244000000" autocomplete="tel">
            </div>
          </div>
        </div>

        <!-- Section 2: Delivery method -->
        <div class="form-section">
          <div class="form-section-header">
            <div class="section-num">2</div>
            <h3>Delivery Method</h3>
          </div>
          <div class="form-section-body">
            <div class="delivery-options">
              <div class="delivery-option selected" id="opt-delivery" onclick="selectDelivery('delivery')">
                <div class="delivery-option-icon">🚚</div>
                <div class="delivery-option-title">Delivery</div>
                <div class="delivery-option-desc">We bring it to your door</div>
                <div class="delivery-option-fee" id="deliveryFeeLabel">Loading...</div>
              </div>
              <div class="delivery-option" id="opt-pickup" onclick="selectDelivery('pickup')">
                <div class="delivery-option-icon">🏪</div>
                <div class="delivery-option-title">Pickup</div>
                <div class="delivery-option-desc">Collect from our store</div>
                <div class="delivery-option-fee" style="color:var(--text-muted)">Free</div>
              </div>
            </div>

            <!-- Address field (shown only for delivery) -->
            <div class="address-field show" id="addressField">
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label" for="deliveryAddress">Delivery Address</label>
                <textarea class="form-input" id="deliveryAddress"
                  placeholder="Enter your full delivery address..."
                  rows="3" style="resize:vertical"></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 3: Note (optional) -->
        <div class="form-section">
          <div class="form-section-header">
            <div class="section-num">3</div>
            <h3>Order Note <span style="font-size:12px;font-weight:400;color:var(--text-light)">(optional)</span></h3>
          </div>
          <div class="form-section-body">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="orderNote">Special Instructions</label>
              <textarea class="form-input" id="orderNote"
                placeholder="e.g. Leave at the gate, call before delivery..."
                rows="2" style="resize:vertical"></textarea>
            </div>
          </div>
        </div>

      </div>

      <!-- Right: Order summary -->
      <div>
        <div class="order-summary">
          <div class="summary-header">
            Order Summary
            <a href="cart.html" class="summary-edit">Edit cart</a>
          </div>
          <div class="summary-body" id="summaryItems">
            <!-- Injected by JS -->
          </div>
          <div class="summary-totals" id="summaryTotals">
            <!-- Injected by JS -->
          </div>
          <div class="summary-footer">
            <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()">
              Place Order
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
            <div class="security-note">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Your order is secure and protected
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="footer-root"></div>

  <script src="js/cart.js"></script>
  <script src="js/api.js"></script>
  <script>
    let deliveryType = 'delivery';
    let deliveryFee = 0;
    let settings = null;

    function formatCurrency(n) { return '$' + Number(n).toFixed(2); }

    function selectDelivery(type) {
      deliveryType = type;

      document.getElementById('opt-delivery').classList.toggle('selected', type === 'delivery');
      document.getElementById('opt-pickup').classList.toggle('selected', type === 'pickup');

      const addressField = document.getElementById('addressField');
      addressField.classList.toggle('show', type === 'delivery');

      updateTotals();
    }

    function updateTotals() {
      const items = Cart.getAll();
      const subtotal = Cart.subtotal();
      const fee = (deliveryType === 'delivery' && settings?.deliveryEnabled) ? deliveryFee : 0;
      const total = subtotal + fee;

      document.getElementById('summaryTotals').innerHTML = `
        <div class="total-row">
          <span>Subtotal</span>
          <span>${formatCurrency(subtotal)}</span>
        </div>
        <div class="total-row">
          <span>Delivery fee</span>
          <span>${deliveryType === 'pickup' ? 'Free' : formatCurrency(fee)}</span>
        </div>
        <div class="total-row grand">
          <span>Total</span>
          <span>${formatCurrency(total)}</span>
        </div>`;
    }

    function renderSummaryItems() {
      const items = Cart.getAll();
      if (items.length === 0) {
        window.location.href = 'cart.html';
        return;
      }

      document.getElementById('summaryItems').innerHTML = items.map(item => {
        const imgSrc = item.image ? `http://localhost:5000${item.image}` : null;
        return `
          <div class="summary-item">
            ${imgSrc
              ? `<img class="summary-item-img" src="${imgSrc}" alt="${item.name}"
                  onerror="this.style.background='var(--bg-subtle)'">`
              : `<div class="summary-item-img" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem">📦</div>`}
            <div class="summary-item-info">
              <div class="summary-item-name">${item.name}</div>
              <div class="summary-item-qty">Qty: ${item.quantity}</div>
            </div>
            <div class="summary-item-price">${formatCurrency(item.price * item.quantity)}</div>
          </div>`;
      }).join('');
    }

    async function loadSettings() {
      try {
        settings = await SettingsAPI.get();
        deliveryFee = settings.deliveryFee || 0;

        // Update delivery fee label
        document.getElementById('deliveryFeeLabel').textContent =
          settings.deliveryEnabled
            ? (deliveryFee > 0 ? `+${formatCurrency(deliveryFee)}` : 'Free')
            : 'Unavailable';

        // Disable delivery option if turned off by admin
        if (!settings.deliveryEnabled) {
          document.getElementById('opt-delivery').style.opacity = '0.45';
          document.getElementById('opt-delivery').style.pointerEvents = 'none';
          selectDelivery('pickup');
        }

        // Disable pickup if turned off
        if (!settings.pickupEnabled) {
          document.getElementById('opt-pickup').style.opacity = '0.45';
          document.getElementById('opt-pickup').style.pointerEvents = 'none';
        }

        updateTotals();
      } catch (err) {
        document.getElementById('deliveryFeeLabel').textContent = 'Check at delivery';
        updateTotals();
      }
    }

    function validate() {
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const address = document.getElementById('deliveryAddress').value.trim();

      if (!name) {
        showToast('Please enter your full name', 'error');
        document.getElementById('customerName').focus();
        return false;
      }
      if (!phone) {
        showToast('Please enter your phone number', 'error');
        document.getElementById('customerPhone').focus();
        return false;
      }
      if (deliveryType === 'delivery' && !address) {
        showToast('Please enter your delivery address', 'error');
        document.getElementById('deliveryAddress').focus();
        return false;
      }
      return true;
    }

    async function placeOrder() {
      if (!validate()) return;

      const btn = document.getElementById('placeOrderBtn');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.innerHTML = `<div class="spinner"></div> Placing your order...`;

      const items = Cart.getAll();
      const subtotal = Cart.subtotal();
      const fee = (deliveryType === 'delivery' && settings?.deliveryEnabled) ? deliveryFee : 0;

      const orderData = {
        customer: {
          name: document.getElementById('customerName').value.trim(),
          phone: document.getElementById('customerPhone').value.trim(),
        },
        items: items.map(i => ({
          product: i._id,
          name: i.name,
          price: i.price,
          quantity: i.quantity,
        })),
        subtotal,
        deliveryFee: fee,
        total: subtotal + fee,
        deliveryType,
        deliveryAddress: deliveryType === 'delivery'
          ? document.getElementById('deliveryAddress').value.trim()
          : '',
        note: document.getElementById('orderNote').value.trim(),
      };

      try {
        const order = await OrdersAPI.place(orderData);
        Cart.clear();
        // Pass order data to confirmation page
        sessionStorage.setItem('lastOrder', JSON.stringify(order));
        window.location.href = 'confirmation.html';
      } catch (err) {
        showToast('Failed to place order. Please try again.', 'error');
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.innerHTML = `Place Order
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
      }
    }

    // Init
    document.getElementById('navbar-root').innerHTML = renderNavbar();
    document.getElementById('footer-root').innerHTML = renderFooter();
    renderSummaryItems();
    loadSettings();
  </script>
</body>
</html>
