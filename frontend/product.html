<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — ShopZone</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
      padding: 48px 0 80px;
    }

    /* ── Image Side ── */
    .product-img-wrap {
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }
    .product-main-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--border);
      background: var(--bg-subtle);
      display: block;
    }
    .product-img-placeholder {
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--border);
      background: var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }

    /* ── Info Side ── */
    .product-category-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      transition: opacity var(--transition);
    }
    .product-category-link:hover { opacity: 0.7; }
    .product-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    .product-price-row {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }
    .product-price {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 700;
      color: var(--text);
    }

    /* Stock badge */
    .stock-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 50px;
      font-size: 12px; font-weight: 600;
    }
    .stock-badge.in-stock {
      background: #eaf3de; color: #3b6d11;
    }
    .stock-badge.low-stock {
      background: #faeeda; color: #854f0b;
    }
    .stock-badge.out-stock {
      background: var(--bg-subtle); color: var(--text-muted);
    }
    .stock-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .in-stock .stock-dot { background: #3b6d11; }
    .low-stock .stock-dot { background: #854f0b; }
    .out-stock .stock-dot { background: var(--text-light); }

    /* Divider */
    .product-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* Description */
    .product-desc {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* Quantity selector */
    .qty-label {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .qty-control {
      display: inline-flex; align-items: center;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .qty-btn {
      width: 44px; height: 44px;
      background: var(--bg-subtle);
      border: none; cursor: pointer;
      font-size: 20px; font-weight: 400;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
      line-height: 1;
    }
    .qty-btn:hover:not(:disabled) { background: var(--border); }
    .qty-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .qty-val {
      width: 56px; text-align: center;
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 600;
      color: var(--text);
      border-left: 1.5px solid var(--border);
      border-right: 1.5px solid var(--border);
      height: 44px; line-height: 44px;
    }

    /* Action buttons */
    .product-actions {
      display: flex; gap: 12px;
      margin-bottom: 28px;
    }
    .btn-add-cart {
      flex: 1;
      background: var(--accent); color: white;
      padding: 15px 24px;
      border-radius: var(--radius-lg);
      font-size: 15px; font-weight: 600;
      border: none; cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: all var(--transition);
    }
    .btn-add-cart:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .btn-add-cart:disabled {
      opacity: 0.45; cursor: not-allowed;
      transform: none;
    }
    .btn-go-cart {
      padding: 15px 20px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn-go-cart:hover {
      border-color: var(--text);
      background: var(--bg-subtle);
    }

    /* Meta info */
    .product-meta {
      background: var(--bg-subtle);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .meta-row {
      display: flex; align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .meta-label { color: var(--text-muted); }
    .meta-val { font-weight: 600; color: var(--text); }

    /* Related products */
    .related-section {
      padding: 64px 0;
      border-top: 1px solid var(--border);
    }

    /* Success animation on add */
    @keyframes popIn {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    .btn-add-cart.added {
      background: #3b6d11;
      animation: popIn 0.25s ease;
    }

    @media (max-width: 768px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 24px 0 60px;
      }
      .product-img-wrap { position: static; }
      .product-actions { flex-direction: column; }
      .btn-go-cart { justify-content: center; }
    }
  </style>
</head>
<body>

  <div id="navbar-root"></div>

  <!-- Breadcrumb -->
  <div style="border-bottom: 1px solid var(--border);">
    <div class="container" style="padding-top: 14px; padding-bottom: 14px;">
      <div class="breadcrumb" id="breadcrumb">
        <a href="index.html">Home</a>
        <span>›</span>
        <a href="products.html">Products</a>
        <span>›</span>
        <span id="breadcrumbName">Loading...</span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="container">
    <div class="product-layout" id="productLayout">
      <!-- Skeleton -->
      <div>
        <div class="skeleton" style="width:100%;aspect-ratio:1;border-radius:var(--radius-xl)"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;padding-top:8px">
        <div class="skeleton" style="height:12px;width:30%"></div>
        <div class="skeleton" style="height:36px;width:85%"></div>
        <div class="skeleton" style="height:36px;width:60%"></div>
        <div class="skeleton" style="height:20px;width:40%"></div>
        <div class="skeleton" style="height:1px;width:100%"></div>
        <div class="skeleton" style="height:14px;width:100%"></div>
        <div class="skeleton" style="height:14px;width:90%"></div>
        <div class="skeleton" style="height:14px;width:75%"></div>
        <div class="skeleton" style="height:52px;width:100%;border-radius:12px"></div>
      </div>
    </div>
  </div>

  <!-- Related Products -->
  <div class="related-section" id="relatedSection" style="display:none">
    <div class="container">
      <div class="section-header" style="margin-bottom:28px">
        <div>
          <h2>You Might Also Like</h2>
          <p>More from the same category</p>
        </div>
        <a href="products.html" class="view-all" id="relatedViewAll">View all →</a>
      </div>
      <div class="products-grid" id="relatedGrid"></div>
    </div>
  </div>

  <div id="footer-root"></div>

  <script src="js/cart.js"></script>
  <script src="js/api.js"></script>
  <script>
    let currentProduct = null;
    let quantity = 1;

    function formatCurrency(n) { return '$' + Number(n).toFixed(2); }

    function getStockBadge(stock) {
      if (stock === 0) return `<span class="stock-badge out-stock"><span class="stock-dot"></span>Out of Stock</span>`;
      if (stock <= 5) return `<span class="stock-badge low-stock"><span class="stock-dot"></span>Only ${stock} left</span>`;
      return `<span class="stock-badge in-stock"><span class="stock-dot"></span>In Stock (${stock} available)</span>`;
    }

    function updateQtyButtons() {
      document.getElementById('qtyDecrease').disabled = quantity <= 1;
      document.getElementById('qtyIncrease').disabled = currentProduct && quantity >= currentProduct.stock;
      document.getElementById('qtyDisplay').textContent = quantity;
    }

    function changeQty(delta) {
      quantity = Math.max(1, Math.min(quantity + delta, currentProduct?.stock || 99));
      updateQtyButtons();
    }

    function handleAddToCart() {
      if (!currentProduct || currentProduct.stock === 0) return;
      for (let i = 0; i < quantity; i++) Cart.add(currentProduct);
      const btn = document.getElementById('addToCartBtn');
      btn.classList.add('added');
      btn.innerHTML = `
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
        Added to Cart!`;
      setTimeout(() => {
        btn.classList.remove('added');
        btn.innerHTML = `
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Add to Cart`;
      }, 2000);
    }

    function renderProduct(p) {
      currentProduct = p;
      const inStock = p.stock > 0;
      const imgSrc = p.image ? p.image : null;

      document.title = `${p.name} — ShopZone`;
      document.getElementById('breadcrumbName').textContent = p.name;

      document.getElementById('productLayout').innerHTML = `
        <!-- Image -->
        <div class="product-img-wrap">
          ${imgSrc
            ? `<img class="product-main-img" src="${imgSrc}" alt="${p.name}"
                onerror="this.outerHTML='<div class=\\'product-img-placeholder\\'>📦</div>'">`
            : `<div class="product-img-placeholder">📦</div>`}
        </div>

        <!-- Info -->
        <div class="product-info">
          <a href="products.html?category=${encodeURIComponent(p.category)}"
            class="product-category-link">
            ← ${p.category}
          </a>

          <h1 class="product-title">${p.name}</h1>

          <div class="product-price-row">
            <div class="product-price">${formatCurrency(p.price)}</div>
            ${getStockBadge(p.stock)}
          </div>

          <div class="product-divider"></div>

          <p class="product-desc">${p.description || 'No description available for this product.'}</p>

          ${inStock ? `
            <div class="qty-label">Quantity</div>
            <div class="qty-control">
              <button class="qty-btn" id="qtyDecrease" onclick="changeQty(-1)" disabled>−</button>
              <div class="qty-val" id="qtyDisplay">1</div>
              <button class="qty-btn" id="qtyIncrease" onclick="changeQty(1)">+</button>
            </div>
          ` : ''}

          <div class="product-actions">
            <button class="btn-add-cart" id="addToCartBtn"
              onclick="handleAddToCart()"
              ${!inStock ? 'disabled' : ''}>
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              ${inStock ? 'Add to Cart' : 'Out of Stock'}
            </button>
            <button class="btn-go-cart" onclick="window.location='cart.html'">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              View Cart
            </button>
          </div>

          <div class="product-meta">
            <div class="meta-row">
              <span class="meta-label">Category</span>
              <span class="meta-val">${p.category}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Availability</span>
              <span class="meta-val">${p.stock > 0 ? 'In Stock' : 'Out of Stock'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Stock</span>
              <span class="meta-val">${p.stock} units</span>
            </div>
          </div>
        </div>`;

      if (inStock) updateQtyButtons();
    }

    function buildRelatedCard(p) {
      const inStock = p.stock > 0;
      const imgSrc = p.image ? p.image : 'images/placeholder.png';
      return `
        <div class="product-card" onclick="window.location='product.html?id=${p._id}'">
          <div class="product-card-img-wrap">
            <img class="product-card-img" src="${imgSrc}" alt="${p.name}"
              onerror="this.style.background='var(--bg-subtle)'">
            ${!inStock ? '<div class="product-card-badge out">Out of Stock</div>' : ''}
          </div>
          <div class="product-card-body">
            <div class="product-card-category">${p.category}</div>
            <div class="product-card-name">${p.name}</div>
            <div class="product-card-footer">
              <div class="product-card-price">${formatCurrency(p.price)}</div>
              <button class="product-card-add"
                onclick="event.stopPropagation();${inStock ? `Cart.add(${JSON.stringify(JSON.stringify(p))})` : ''}"
                ${!inStock ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>+</button>
            </div>
          </div>
        </div>`;
    }

    async function init() {
      document.getElementById('navbar-root').innerHTML = renderNavbar();
      document.getElementById('footer-root').innerHTML = renderFooter();

      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        document.getElementById('productLayout').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">🔍</div>
            <h3>Product not found</h3>
            <p>The product you're looking for doesn't exist.</p>
            <a href="products.html" class="btn btn-primary" style="margin-top:16px">Browse Products</a>
          </div>`;
        return;
      }

      try {
        const product = await ProductsAPI.getOne(id);
        renderProduct(product);

        // Load related products
        const all = await ProductsAPI.getAll({ category: product.category });
        const related = all.filter(p => p._id !== id).slice(0, 4);
        if (related.length > 0) {
          document.getElementById('relatedSection').style.display = 'block';
          document.getElementById('relatedGrid').innerHTML = related.map(buildRelatedCard).join('');
          document.getElementById('relatedViewAll').href =
            `products.html?category=${encodeURIComponent(product.category)}`;
        }
      } catch (err) {
        document.getElementById('productLayout').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">⚠️</div>
            <h3>Couldn't load product</h3>
            <p>Make sure the backend server is running.</p>
            <a href="products.html" class="btn btn-secondary" style="margin-top:16px">← Back to Products</a>
          </div>`;
      }
    }

    init();
  </script>
</body>
</html>
